<section
  id="hero"
  class="hero max-w-[1280px] mx-auto px-lg py-xl md:py-[120px] flex flex-col md:flex-row items-center gap-xl border-b border-surface-container-highest"
>
  <!-- Ambient animated background -->
  <div class="hero-bg" aria-hidden="true">
    <div class="hero-aurora hero-aurora-1"></div>
    <div class="hero-aurora hero-aurora-2"></div>
    <div class="hero-grid"></div>
  </div>

  <div class="hero-content relative z-10 w-full md:w-[60%] flex flex-col items-start gap-md">
    <!-- <div
      class="hero-badge inline-flex items-center gap-xs px-sm py-xs bg-surface-container-low rounded-full border border-surface-container-highest font-label-caps text-[12px] text-on-surface-variant"
    >
      <span class="relative flex w-2 h-2">
        <span
          class="absolute inline-flex w-full h-full rounded-full bg-primary-container opacity-75 animate-ping"
        ></span>
        <span class="relative inline-flex w-2 h-2 rounded-full bg-primary-container"></span>
      </span>
      {{ 'hero.badge' | translate }}
    </div> -->
    <h1
      class="hero-title font-display text-[48px] md:text-[64px] font-bold text-on-surface leading-tight tracking-tighter max-w-[800px]"
      [innerHTML]="'hero.title' | translate"
    ></h1>
    <p class="hero-subtitle font-body-lg text-[18px] text-on-surface-variant max-w-[600px] mt-sm">
      {{ 'hero.subtitle' | translate }}
    </p>
    <div class="hero-actions flex flex-col sm:flex-row gap-md mt-lg w-full sm:w-auto">
      <a
        href="#projects"
        class="hero-cta-primary inline-flex items-center justify-center px-xl py-md bg-primary-container text-on-surface font-body-md font-medium rounded hover:bg-primary-fixed-dim hover:scale-[1.02] transition-all duration-200"
      >
        {{ 'hero.cta.viewWork' | translate }}
      </a>
      <a
        href="#contact"
        class="inline-flex items-center justify-center px-xl py-md bg-transparent text-on-surface font-body-md font-medium border border-outline hover:border-on-surface hover:scale-[1.02] transition-all duration-200 rounded"
      >
        {{ 'hero.cta.getInTouch' | translate }}
      </a>
    </div>
  </div>

  <div class="hero-visual-wrap relative z-10 w-full md:w-[40%]">
    <div
      class="hero-visual hero-float"
      (pointermove)="onTilt($event)"
      (pointerleave)="resetTilt()"
      [style.--rx]="tiltX() + 'deg'"
      [style.--ry]="tiltY() + 'deg'"
    >
      <div
        class="relative rounded-xl overflow-hidden shadow-subtle border border-surface-container-highest bg-[#1a1a1a] p-xs aspect-[4/3] flex items-center justify-center"
      >
        <img
          src="images/hero-stuff.png"
          alt="Code Mockup"
          class="w-full h-full object-cover rounded-lg opacity-90"
        />
        <div
          class="absolute inset-0 bg-gradient-to-tr from-black/40 to-transparent pointer-events-none rounded-xl"
        ></div>
        <span class="hero-shine"></span>
      </div>

      <!-- Floating status chip -->
      <div
        class="hero-chip -bottom-4 -left-4 inline-flex items-center gap-xs px-sm py-xs bg-surface/90 rounded-lg border border-surface-container-highest shadow-subtle font-label-caps text-[11px] text-on-surface-variant"
      >
        <span class="material-symbols-outlined text-primary-fixed-dim" style="font-size: 16px"
          >verified</span
        >
        Secure by design
      </div>
    </div>
  </div>
</section>
